services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketforge
      POSTGRES_PASSWORD: marketforge
      POSTGRES_DB: marketforge
    ports:
      # Host 5433 avoids clashing with a local Postgres on 5432
      - '5433:5432'
    volumes:
      - marketforge_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marketforge -d marketforge']
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  marketforge_pg_data:
