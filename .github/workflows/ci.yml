name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: marketforge
          POSTGRES_PASSWORD: marketforge
          POSTGRES_DB: marketforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U marketforge -d marketforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://marketforge:marketforge@localhost:5432/marketforge
      BETTER_AUTH_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci
      BETTER_AUTH_URL: http://localhost:5173
      PUBLIC_APP_URL: http://localhost:5173
      DEV_TEST_PASSWORD: ci-test-password-12345

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:migrate

      - run: pnpm db:seed

      - run: pnpm check

      - run: pnpm lint

      - run: pnpm test:unit

      - run: pnpm build

      - run: pnpm exec playwright install chromium --with-deps

      - name: E2E
        run: pnpm exec playwright test
        env:
          CI: true
